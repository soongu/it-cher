<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- LangChain — 🦜🔗 parrot + chain mark -->
  <!-- chain-link perch -->
  <g fill="none" stroke="#2F6F6A" stroke-width="7" stroke-linecap="round">
    <ellipse cx="58" cy="113" rx="17" ry="9"/>
    <ellipse cx="86" cy="115" rx="12" ry="7"/>
  </g>
  <!-- tail feathers -->
  <path fill="#138a5a" d="M82 90 110 110 105 117 98 109 96 119 89 109 84 117 73 98Z"/>
  <!-- body -->
  <ellipse cx="70" cy="73" rx="30" ry="30" fill="#21b573"/>
  <!-- head -->
  <circle cx="51" cy="44" r="24" fill="#21b573"/>
  <!-- crest feathers -->
  <path fill="#21b573" d="M50 24C52 9 61 6 67 11 60 13 57 19 57 26ZM58 27C65 14 74 14 78 21 71 20 66 26 64 33Z"/>
  <!-- wing -->
  <path fill="#138a5a" d="M60 58C83 53 99 68 92 92 84 77 72 69 58 71Z"/>
  <!-- belly highlight -->
  <ellipse cx="60" cy="86" rx="12" ry="15" fill="#54d699" opacity=".55"/>
  <!-- feet -->
  <g stroke="#f0982a" stroke-width="5" stroke-linecap="round">
    <path d="M60 100 58 110"/><path d="M72 100 73 110"/>
  </g>
  <!-- beak (hooked) -->
  <path fill="#f4a02a" d="M33 35C13 35 5 51 16 62 18 57 22 56 27 57 24 50 28 43 35 43Z"/>
  <path fill="#d97e1e" d="M16 62C18 57 22 56 27 57 26 61 22 63 18 63Z"/>
  <!-- eye -->
  <circle cx="45" cy="40" r="8.5" fill="#fff"/>
  <circle cx="43" cy="41" r="4.3" fill="#16302a"/>
  <circle cx="41.5" cy="39" r="1.5" fill="#fff"/>
</svg>
